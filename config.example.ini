# config.ini — Copy this file to config.ini and fill in your values.
# tracker.py reads this automatically if present.

[candidate]
name     = Kunj Rathod
email    = kunj@example.com
phone    = (000) 000-0000
linkedin = https://linkedin.com/in/kunjrathod
github   = https://github.com/kunjrathod

# ── SMTP — only needed for `tracker.py remind --send` ──────────────────────
# Leave blank to skip email functionality (all other commands work without it).
[smtp]
host = smtp.gmail.com
port = 587
user = kunj@example.com
pass = your_app_password_here
from = kunj@example.com
to   = kunj@example.com

# ── Resume generation — needed for `tracker.py resume <company>` ────────────
[resume]
# provider choices:
#   auto       = use API keys first, then Codex/Claude subscription CLIs
#   codex_cli  = OpenAI/ChatGPT OAuth subscription via `codex login` / Codex CLI
#   claude_cli = Anthropic subscription via `claude auth` / Claude Code CLI
#   openai     = OpenAI API key
#   anthropic  = Anthropic API key
provider = codex_cli
# Optional. Defaults depend on provider: gpt-5.1-codex, sonnet, gpt-5.1, claude-sonnet-4-6.
model =
# Only needed for provider=anthropic. Env var ANTHROPIC_API_KEY overrides this.
anthropic_api_key =
# Only needed for provider=openai. Env var OPENAI_API_KEY overrides this.
openai_api_key =
# Directory containing top_ai_ml.tex, top_swe.tex, top_backend_infra.tex
templates_dir = /path/to/Kunj_Rathod_Resume
# Where generated resumes are saved (created automatically)
output_dir = /path/to/Kunj_Rathod_Resume/generated
